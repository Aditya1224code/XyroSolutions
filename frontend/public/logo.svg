<svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="optimizeLegibility">
  <defs>
    <linearGradient id="leafGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16D6C9"/>
      <stop offset="50%" stop-color="#34E5E1"/>
      <stop offset="100%" stop-color="#0FB7B0"/>
    </linearGradient>
    <filter id="logoTextShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.8" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Original icon - left side -->
  <g transform="translate(20 40)">
    <path d="M 426 218 C 462 218 500 258 528 314 C 502 340 470 354 438 354 C 402 354 377 327 377 296 C 377 257 399 218 426 218 Z" fill="url(#leafGradient)" transform="scale(0.25) translate(-1500, -700)"/>
    <path d="M 726 218 C 690 218 652 258 624 314 C 650 340 682 354 714 354 C 750 354 775 327 775 296 C 775 257 753 218 726 218 Z" fill="url(#leafGradient)" transform="scale(0.25) translate(-1500, -700)"/>
    <path d="M 426 562 C 462 562 500 522 528 466 C 502 440 470 426 438 426 C 402 426 377 453 377 484 C 377 523 399 562 426 562 Z" fill="url(#leafGradient)" opacity="0.95" transform="scale(0.25) translate(-1500, -700)"/>
    <path d="M 726 562 C 690 562 652 522 624 466 C 650 440 682 426 714 426 C 750 426 775 453 775 484 C 775 523 753 562 726 562 Z" fill="url(#leafGradient)" opacity="0.95" transform="scale(0.25) translate(-1500, -700)"/>
  </g>

  <!-- Icon circles simplified for clarity -->
  <circle cx="60" cy="60" r="18" fill="url(#leafGradient)"/>
  <circle cx="110" cy="60" r="18" fill="url(#leafGradient)"/>
  <circle cx="60" cy="110" r="18" fill="url(#leafGradient)" opacity="0.95"/>
  <circle cx="110" cy="110" r="18" fill="url(#leafGradient)" opacity="0.95"/>

  <!-- Text - right side, full width -->
  <text x="180" y="95" font-family="Arial, sans-serif" font-size="80" font-weight="900" letter-spacing="0.6" filter="url(#logoTextShadow)">
    <tspan fill="#19D5D0">Xyro</tspan>
    <tspan fill="#111111" dx="8">Solutions</tspan>
  </text>
</svg>