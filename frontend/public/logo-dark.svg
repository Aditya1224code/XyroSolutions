<svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="optimizeLegibility">
  <defs>
    <linearGradient id="leafGradientDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16D6C9"/>
      <stop offset="50%" stop-color="#34E5E1"/>
      <stop offset="100%" stop-color="#0FB7B0"/>
    </linearGradient>
    <filter id="logoTextShadowDark" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.8" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
  </defs>

  <!-- Icon circles - left side -->
  <circle cx="60" cy="60" r="18" fill="url(#leafGradientDark)"/>
  <circle cx="110" cy="60" r="18" fill="url(#leafGradientDark)"/>
  <circle cx="60" cy="110" r="18" fill="url(#leafGradientDark)" opacity="0.95"/>
  <circle cx="110" cy="110" r="18" fill="url(#leafGradientDark)" opacity="0.95"/>

  <!-- Text - right side, full width -->
  <text x="180" y="95" font-family="Arial, sans-serif" font-size="80" font-weight="900" letter-spacing="0.6" filter="url(#logoTextShadowDark)">
    <tspan fill="#19D5D0">Xyro</tspan>
    <tspan fill="#FFFFFF" dx="8">Solutions</tspan>
  </text>
</svg>